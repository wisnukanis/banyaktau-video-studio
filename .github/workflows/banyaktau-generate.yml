name: BanyakTau Generate Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Optional topic seed
        required: false
        default: ""
      category:
        description: Category
        required: false
        default: random
      duration:
        description: Duration seconds
        required: false
        default: "90"
      scenes:
        description: Scene count
        required: false
        default: "7"
      tts_provider:
        description: openai or elevenlabs
        required: false
        default: openai
      image_quality:
        description: low, medium, high
        required: false
        default: low
      with_clip:
        description: Try video AI clip true/false
        required: false
        default: "true"
  schedule:
    # GitHub cron uses UTC. Runs at 08:15 and 20:15 WIB/Asia-Bangkok.
    - cron: "15 1 * * *"
    - cron: "15 13 * * *"

concurrency:
  group: banyaktau-generate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: ${{ secrets.UPLOAD_DRIVER || 'auto' }}
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      SFTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.SFTP_UPLOAD_TIMEOUT_SECONDS || '180' }}
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
      FTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.FTP_UPLOAD_TIMEOUT_SECONDS || '180' }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      STORY_MODEL: ${{ secrets.STORY_MODEL || 'gpt-4o-mini' }}
      IMAGE_MODEL: ${{ secrets.IMAGE_MODEL || 'dall-e-3' }}
      IMAGE_SIZE: ${{ secrets.IMAGE_SIZE || '1024x1792' }}
      IMAGE_QUALITY: ${{ github.event.inputs.image_quality || secrets.IMAGE_QUALITY || 'low' }}
      OPENAI_TTS_MODEL: ${{ secrets.OPENAI_TTS_MODEL || 'tts-1' }}
      OPENAI_TTS_VOICE: ${{ secrets.OPENAI_TTS_VOICE || 'shimmer' }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL || 'whisper-1' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_MODEL: ${{ secrets.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}

      VIDEO_API_KEY: ${{ secrets.VIDEO_API_KEY || secrets.GEMINI_API_KEY || secrets.DINOIKI_API_KEY }}
      VIDEO_BASE_URL: ${{ secrets.VIDEO_BASE_URL || secrets.GEMINI_BASE_URL || 'https://generativelanguage.googleapis.com' }}
      VIDEO_ENDPOINT_MODE: ${{ secrets.VIDEO_ENDPOINT_MODE || 'gemini' }}
      VIDEO_MODEL: ${{ secrets.VIDEO_MODEL || 'veo-3.1-lite-generate-preview' }}
      VIDEO_SECONDS: ${{ secrets.VIDEO_SECONDS || '4' }}
      VIDEO_USD_PER_SECOND: ${{ secrets.VIDEO_USD_PER_SECOND || '0.03' }}
      SPEECH_TEMPO: ${{ secrets.SPEECH_TEMPO || '1.15' }}

      GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION || 'v25.0' }}
      FACEBOOK_UPLOAD_ENABLED: ${{ secrets.FACEBOOK_UPLOAD_ENABLED || secrets.DUNIALUAS_FACEBOOK_UPLOAD_ENABLED || secrets.BANYAKTAU_FACEBOOK_UPLOAD_ENABLED || 'false' }}
      FACEBOOK_PAGE_ID: ${{ secrets.DUNIALUAS_FACEBOOK_PAGE_ID || secrets.BANYAKTAU_FACEBOOK_PAGE_ID || secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.DUNIALUAS_FACEBOOK_PAGE_ACCESS_TOKEN || secrets.BANYAKTAU_FACEBOOK_PAGE_ACCESS_TOKEN || secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.DUNIALUAS_FACEBOOK_USER_ACCESS_TOKEN || secrets.BANYAKTAU_FACEBOOK_USER_ACCESS_TOKEN || secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      FACEBOOK_MEDIA_TYPE: ${{ secrets.FACEBOOK_MEDIA_TYPE || 'reel' }}
      FACEBOOK_VIDEO_STATE: ${{ secrets.FACEBOOK_VIDEO_STATE || 'PUBLISHED' }}
      FACEBOOK_TITLE_PREFIX: ${{ secrets.FACEBOOK_TITLE_PREFIX }}
      FACEBOOK_STRICT_PUBLISH: ${{ secrets.FACEBOOK_STRICT_PUBLISH || 'false' }}

      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED || secrets.BHANYAKTAU_INSTAGRAM_UPLOAD_ENABLED || secrets.DUNIALUAS_INSTAGRAM_UPLOAD_ENABLED || secrets.BANYAKTAU_INSTAGRAM_UPLOAD_ENABLED || 'false' }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.BHANYAKTAU_INSTAGRAM_IG_USER_ID || secrets.DUNIALUAS_INSTAGRAM_IG_USER_ID || secrets.BANYAKTAU_INSTAGRAM_IG_USER_ID || secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.BHANYAKTAU_INSTAGRAM_ACCESS_TOKEN || secrets.DUNIALUAS_INSTAGRAM_ACCESS_TOKEN || secrets.BANYAKTAU_INSTAGRAM_ACCESS_TOKEN || secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_SHARE_TO_FEED: ${{ secrets.INSTAGRAM_SHARE_TO_FEED || 'true' }}
      INSTAGRAM_MAX_DURATION_SECONDS: ${{ secrets.INSTAGRAM_MAX_DURATION_SECONDS || '90' }}
      INSTAGRAM_CONTAINER_POLL_SECONDS: ${{ secrets.INSTAGRAM_CONTAINER_POLL_SECONDS || '6' }}
      INSTAGRAM_CONTAINER_MAX_ATTEMPTS: ${{ secrets.INSTAGRAM_CONTAINER_MAX_ATTEMPTS || '90' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Check FFmpeg
        id: ffmpeg
        shell: bash
        run: |
          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            ffmpeg -version | head -n 1
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install FFmpeg
        if: steps.ffmpeg.outputs.ready != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate source
        run: npm run check

      - name: Preflight
        run: npm run preflight

      - name: Generate full video
        run: |
          npm run run:once -- \
            --topic "${{ github.event.inputs.topic || '' }}" \
            --category "${{ github.event.inputs.category || 'random' }}" \
            --duration "${{ github.event.inputs.duration || '90' }}" \
            --scenes "${{ github.event.inputs.scenes || '7' }}" \
            --tts-provider "${{ github.event.inputs.tts_provider || 'openai' }}" \
            --image-quality "${{ github.event.inputs.image_quality || secrets.IMAGE_QUALITY || 'low' }}" \
            --with-clip "${{ github.event.inputs.with_clip || 'true' }}"
